        if (!targetBalloon || targetBalloon.popping) return;

        onBalloonPop();

        const burstId = `${id}-${Date.now()}`;
        const confettiColors = ['#ffffff', targetBalloon.color, '#BBE1FF', '#ffd166', '#90d0d0'];
        const shards = Array.from({ length: 18 }, (_, i) => {
            const angle = (Math.PI * 2 * i) / 18 + (Math.random() * 0.5 - 0.25);
            const distance = 35 + Math.random() * 70;
            return {
                id: `${burstId}-${i}`,
                burstId,
                x: e.clientX,
                y: e.clientY,
                dx: Math.cos(angle) * distance,
                dy: Math.sin(angle) * distance - (10 + Math.random() * 20),
                rot: (Math.random() * 540 - 270).toFixed(0) + 'deg',
                size: (4 + Math.random() * 7).toFixed(1) + 'px',
                br: i % 4 === 0 ? '50%' : '2px',
                dur: (0.65 + Math.random() * 0.45).toFixed(2) + 's',
                color: confettiColors[i % confettiColors.length],
            };
        });

        setBalloons(prev => prev.map(b => (b.id === id ? { ...b, popping: true } : b)));
        setPopBursts(prev => [...prev, { id: burstId, x: e.clientX, y: e.clientY, color: targetBalloon.color }]);
        setPopConfetti(prev => [...prev, ...shards]);

        setTimeout(() => {
            setPopBursts(prev => prev.filter(p => p.id !== burstId));
            setBalloons(prev => prev.map(b => (b.id === id ? createBalloon(id, b.version + 1) : b)));
        }, 420);
        setTimeout(() => {
            setPopConfetti(prev => prev.filter(p => p.burstId !== burstId));
        }, 1200);
    };

    // Confetti burst pieces
    const confettiColors = ['#e07aa0','#d4a0e8','#f5b8d4','#f0c878','#a0e0a8','#80c8f0','#fff'];
    const confettiPieces = Array.from({ length: 50 }, (_, i) => {
        const angle = (Math.PI * 2 * i) / 50 + (i * 0.3);
        const dist = 150 + (i * 37 % 250);
        return {
            color: confettiColors[i % confettiColors.length],
            dx: Math.cos(angle) * dist,
            dy: Math.sin(angle) * dist - 200,
            rot: (i * 137 % 1080),
            dur: 2 + (i * 17 % 15) / 10,
            delay: 1.8 + (i * 7 % 20) / 40,
            w: 5 + (i * 3 % 7),
            h: 5 + (i * 5 % 8),
            br: i % 3 === 0 ? '50%' : '2px',
            left: 50 + (Math.cos(angle) * 5),
            top: 40,
        };
    });

    // Friends ticker — duplicate for seamless scroll
    const friends = CONFIG.friends || [];
    const tickerItems = [...friends, ...friends];
    const popsRemaining = Math.max(0, LETTERS_UNLOCK_TARGET - balloonsPopped);

            {/* Floating balloons */}
            <div className="balloons-container">
                {balloons.map((b, i) => (
                    <div key={`${b.id}-${b.version}`} className={`balloon ${b.popping ? 'popping' : ''}`} style={{

// =============================
//  READING PAGE — SPIRAL NOTEBOOK + POLAROIDS
// =============================
const SPIRAL_COUNT = 16;

// Polaroid layout patterns — cycles through different positions per letter
const POLAROID_LAYOUTS = [
    'top-right-bottom-left',    // 1st photo floats right near top, 2nd floats left near bottom
    'top-left-bottom-right',    // reversed
    'both-right',               // both stacked on the right side
    'split-middle',             // one left, one right midway through text
    'pair-bottom',              // both side-by-side at the end
    'top-left-pair-bottom',     // one floats top-left, pair at bottom
    'scattered-right',          // both on right side at different heights
    'top-right-inline-bottom',  // one floats top-right, one centered at bottom
];

function getLetterPhotoBaseName(name) {
    return String(name || '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '');
}

function LetterPolaroid({ photo, rot, tapeRot, className, style }) {
    return (
        <div className={`polaroid ${className || ''}`} style={{
            '--rot': `${rot}deg`,
            '--tape-rot': `${tapeRot}deg`,
            ...style
        }}>
            <div className="polaroid-img">
                {photo.src ? (
                    <img src={photo.src} alt={photo.caption} />
                ) : (
                    <span className="placeholder">add photo</span>
                )}
            </div>
            <div className="polaroid-caption">{photo.caption}</div>
        </div>
    );
}

function ReadingPage({ index, onBack, tearing }) {
    const letter = CONFIG.letters[index];
    const photoBaseName = getLetterPhotoBaseName(letter.from);
    const photos = letter.photos || [
        { src: `photos/${photoBaseName}.1.jpg`, caption: '' },
        { src: `photos/${photoBaseName}.2.jpg`, caption: '' }
    ];
    const spirals = Array.from({ length: SPIRAL_COUNT }, (_, i) => i);
    const layout = POLAROID_LAYOUTS[index % POLAROID_LAYOUTS.length];

    // Split message roughly in half for inserting polaroids in the middle
    const lines = letter.message.split('\n');
    const mid = Math.floor(lines.length / 2);
    const topPart = lines.slice(0, mid).join('\n');
    const bottomPart = lines.slice(mid).join('\n');

    // Rotation values seeded by index for variety
    const r1 = ((index * 7 + 3) % 9) - 4;     // -4 to 4
    const r2 = ((index * 5 + 11) % 9) - 4;
    const t1 = ((index * 3 + 1) % 5) - 2;
    const t2 = ((index * 4 + 7) % 5) - 2;

    const renderContent = () => {
        switch (layout) {
            case 'top-right-bottom-left':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-right" />
                        <div className="paper-body">{topPart}</div>
                        <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} className="polaroid-float float-left" />
                        <div className="paper-body">{bottomPart}</div>
                        <div className="clear-float" />
                    </div>
                );
            case 'top-left-bottom-right':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-left" />
                        <div className="paper-body">{topPart}</div>
                        <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} className="polaroid-float float-right" />
                        <div className="paper-body">{bottomPart}</div>
                        <div className="clear-float" />
                    </div>
                );
            case 'both-right':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-right float-delayed-start" />
                        <div className="paper-body">{topPart}</div>
                        <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} className="polaroid-float float-right" />
                        <div className="paper-body">{bottomPart}</div>
                        <div className="clear-float" />
                    </div>
                );
            case 'split-middle':
                return (
                    <div className="letter-content-wrapper">
                        <div className="paper-body">{topPart}</div>
                        <div className="polaroid-pair">
                            <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} />
                            <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} />
                        </div>
                        <div className="paper-body">{bottomPart}</div>
                    </div>
                );
            case 'pair-bottom':
                return (
                    <div className="letter-content-wrapper">
                        <div className="paper-body">{letter.message}</div>
                        <div className="polaroid-pair">
                            <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} />
                            <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} />
                        </div>
                    </div>
                );
            case 'top-left-pair-bottom':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-left" />
                        <div className="paper-body">{letter.message}</div>
                        <div className="clear-float" />
                        <div className="polaroid-pair">
                            <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} />
                        </div>
                    </div>
                );
            case 'scattered-right':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-right" style={{ marginTop: '0px' }} />
                        <div className="paper-body">{topPart}</div>
                        <div className="clear-float" />
                        <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} className="polaroid-float float-right" style={{ marginTop: '10px' }} />
                        <div className="paper-body">{bottomPart}</div>
                        <div className="clear-float" />
                    </div>
                );
            case 'top-right-inline-bottom':
                return (
                    <div className="letter-content-wrapper">
                        <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} className="polaroid-float float-right" />
                        <div className="paper-body">{letter.message}</div>
                        <div className="clear-float" />
                        <div style={{ textAlign: 'center', margin: '15px 0' }}>
                            <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} className="polaroid-inline" />
                        </div>
                    </div>
                );
            default:
                return (
                    <div className="letter-content-wrapper">
                        <div className="paper-body">{letter.message}</div>
                        <div className="polaroid-pair">
                            <LetterPolaroid photo={photos[0]} rot={r1} tapeRot={t1} />
                            <LetterPolaroid photo={photos[1] || photos[0]} rot={r2} tapeRot={t2} />
                        </div>
                    </div>
                );
        }
    };

    return (
        <div className="page reading-page page-transition-enter">
            <div className={`notebook-wrapper ${tearing ? 'tearing' : ''}`}>
                <div className="spiral-rings">
                    {spirals.map(i => <div key={i} className="spiral-ring" />)}
                </div>
                <div className="notebook-paper">
                    <div className="paper-to">Dear {CONFIG.name},</div>
                    {renderContent()}
                    <div className="paper-signature">with love, {letter.from}</div>
                </div>
            </div>
            <button className="back-btn" onClick={onBack}>Back to letters</button>
        </div>
    );
}

// =============================
//  GALLERY PAGE — POLAROID THEME
// =============================
function GalleryPage() {
    const rotations = CONFIG.galleryPhotos.map((p) => p.rot || (Math.random() * 6 - 3));
    return (
        <div className="page gallery-section page-transition-enter">
            <div className="section-header">
                <div className="section-label">the fun side</div>
                <h2 className="section-title">Your Funniest Moments</h2>
                <div className="section-line" />
            </div>
            <div className="gallery-masonry">
                {CONFIG.galleryPhotos.map((p, i) => (
                    <div className="gallery-item-wrapper" key={i} style={{
                        animationDelay: `${0.1 + i * 0.1}s`,
                        '--rot': `${rotations[i]}deg`
                    }}>
                        <div className="gallery-polaroid" style={{
                            '--rot': `${rotations[i]}deg`,
                            '--ratio': p.ratio

                            <div className="gallery-polaroid-img" style={{ '--ratio': p.ratio }}>

                                ) : (
                                    <span className="placeholder">add photo</span>

// =============================
//  CONFESSIONS WALL
// =============================
const NOTE_COLORS = ['note-pink', 'note-yellow', 'note-blue', 'note-green', 'note-lavender', 'note-peach'];
const PIN_COLORS = ['pin-red', 'pin-blue', 'pin-green', 'pin-yellow', 'pin-white'];

function ConfessionsPage() {
    return (
        <div className="page confessions-section page-transition-enter">
            <div className="confessions-header">
                <div className="confessions-header-icon">{"\ud83d\udc9b"}</div>
                <h2 className="confessions-header-title">21 Reasons We Love You</h2>
                <p className="confessions-header-sub">One heartfelt reason from each letter, pinned here forever.</p>
            </div>
            <div className="confessions-wall">
                {CONFIG.confessions.map((c, i) => {
                    const rot = ((i * 7 + 3) % 13) - 6;
                    const noteColor = NOTE_COLORS[i % NOTE_COLORS.length];
                    const pinColor = PIN_COLORS[i % PIN_COLORS.length];
                    return (
                        <div className="confession-wrapper" key={i} style={{
                            animationDelay: `${0.1 + i * 0.08}s`,
                            '--rot': `${rot}deg`
                        }}>
                            <div className={`confession-note ${noteColor}`} style={{ '--rot': `${rot}deg` }}>
                                <div className={`confession-pin ${pinColor}`} />
                                <div className="confession-text">"{c.text}"</div>
                                <div className="confession-by">— {c.by}</div>
                            </div>
                        </div>
                    );
                })}
            </div>
        </div>
    );
}

// =============================
//  FINALE PAGE
// =============================
function FinalePage({ onImagesLoaded }) {
    const [imagesLoading, setImagesLoading] = useState(true);
    const [loadedCount, setLoadedCount] = useState(0);
    
    // Get all photos from CONFIG
    const photos = CONFIG.photos || [];
    const numColumns = 5;
    
    // Create columns with alternating scroll directions
    const createColumns = () => {
        const columns = Array.from({ length: numColumns }, (_, colIdx) => []);
        
        // Distribute photos across columns
        photos.forEach((photo, idx) => {
            columns[idx % numColumns].push(photo);
        });
        
        // Duplicate photos for seamless looping
        return columns.map((col, idx) => ({
            photos: [...col, ...col, ...col],
            direction: idx % 2 === 0 ? 'scroll-up' : 'scroll-down'
        }));
    };
    
    const columns = createColumns();
    const totalImages = columns.reduce((sum, col) => sum + col.photos.length, 0);
    
    // Handle image load
    const handleImageLoad = useCallback(() => {
        setLoadedCount(prev => {
            const newCount = prev + 1;
            if (newCount === totalImages) {
                setImagesLoading(false);
                if (onImagesLoaded) {
                    onImagesLoaded();
                }
            }
            return newCount;
        });
    }, [totalImages, onImagesLoaded]);
    
    return (
        <>
            {imagesLoading && (
                <div className="finale-loading-overlay">
                    <div className="finale-loading-content">
                        <div className="finale-loading-spinner" />
                        <div className="finale-loading-text">Loading your moments...</div>
                        <div className="finale-loading-progress">{loadedCount} / {totalImages}</div>
                    </div>
                </div>
            )}
            <div className="page finale page-transition-enter" style={{ opacity: imagesLoading ? 0 : 1, transition: 'opacity 0.5s ease' }}>
                {/* Movie reel style photo carousel background */}
                <div className="photo-carousel">
                {columns.map((column, colIdx) => (
                    <div key={`column-${colIdx}`} className="carousel-column">
                        <div className={`carousel-column-track ${column.direction}`}>
                            {column.photos.map((photo, photoIdx) => (
                                <img 
                                    key={`photo-${colIdx}-${photoIdx}`}
                                    src={photo.src} 
                                    alt={photo.caption || 'Carousel photo'}
                                    className="carousel-photo"
                                    onLoad={handleImageLoad}
                                    onError={(e) => {
                                        e.target.style.opacity = '0';
                                        handleImageLoad(); // Count as loaded even if error
                                    }}
                                />
                            ))}
                        </div>
                    </div>
                ))}
            </div>
            
            {/* Content on top of carousel */}
            <div className="ring-decor" style={{ width: 300, height: 300, top: '20%', left: '10%' }} />
            <div className="ring-decor" style={{ width: 200, height: 200, bottom: '15%', right: '8%', animationDelay: '1s' }} />
            <div className="ring-decor" style={{ width: 150, height: 150, top: '60%', left: '60%', animationDelay: '2s' }} />
            <h2 className="finale-title">{CONFIG.finaleTitle}</h2>
            <p className="finale-msg">{CONFIG.finaleMessage}</p>
            <div className="finale-heart-container">
                <div className="finale-heart" />
            </div>
            </div>
        </>
    );
}

function LetterChallengeModal({ open, challenge, answer, onAnswerChange, onSubmit, onSkip, error, letterFrom, tapCount, onTap }) {
    if (!open || !challenge) return null;
    const modeLabel = challenge.type === 'unscramble'
        ? 'Unscramble'
        : challenge.type === 'tap'
            ? 'Tap challenge'
            : challenge.type === 'math'
                ? 'Math puzzle'
                : challenge.type === 'reverse'
                    ? 'Reverse code'
                    : 'Riddle';

    return (
        <div className="challenge-overlay" onClick={onSkip}>
            <div className="challenge-card" onClick={(e) => e.stopPropagation()}>
                <div className="challenge-tag">letter challenge</div>
                <div className="challenge-mode">{modeLabel}</div>
                <div className="challenge-title">Solve to open {letterFrom}'s letter</div>
                <div className="challenge-question">{challenge.question}</div>
                <div className="challenge-hint">Hint: {challenge.hint}</div>

                {challenge.type === 'tap' ? (
                    <div className="tap-wrap">
                        <div className="tap-count">taps: {tapCount} / {challenge.target}</div>
                        <button className="tap-heart-btn" onClick={onTap}>{'♥'}</button>
                    </div>
                ) : (
                    <>
                        {challenge.type === 'unscramble' ? (
                            <div className="challenge-activity">
                                <div className="scramble-word">{challenge.scrambled}</div>
                            </div>
                        ) : null}
                        <input
                            className="challenge-input"
                            value={answer}
                            onChange={(e) => onAnswerChange(e.target.value)}
                            onKeyDown={(e) => { if (e.key === 'Enter') onSubmit(); }}
                            placeholder="Type your answer..."
                            autoFocus
                        />
                    </>
                )}

                {error ? <div className="challenge-error">{error}</div> : null}
                <div className="challenge-actions">
                    <button className="challenge-btn" onClick={onSkip}>back</button>
                    <button className="challenge-btn primary" onClick={onSubmit}>unlock letter</button>
                </div>
            </div>
        </div>
    );
}

function RewardBadge({ solved, total }) {
    return (
        <div className="reward-badge">
            <div className="reward-badge-label">badges earned</div>
            <div className="reward-badge-value">{solved}/{total}</div>
        </div>
    );
}

// =============================
//  APP
// =============================
function App() {
    const [loading, setLoading] = useState(true);
    const [page, setPage] = useState('hero');
    const [opened, setOpened] = useState(new Set());
    const [readingIdx, setReadingIdx] = useState(null);
    const [tearing, setTearing] = useState(false);
    const [balloonsPopped, setBalloonsPopped] = useState(0);
    const [lettersUnlocked, setLettersUnlocked] = useState(false);
    const [challengeOpen, setChallengeOpen] = useState(false);
    const [challengeInput, setChallengeInput] = useState('');
    const [challengeError, setChallengeError] = useState('');
    const [pendingLetter, setPendingLetter] = useState(null);
    const [tapCount, setTapCount] = useState(0);
    const [solvedChallenges, setSolvedChallenges] = useState(0);
    const [rewardToast, setRewardToast] = useState('');
    const [finaleImagesLoaded, setFinaleImagesLoaded] = useState(false);
    const confetti = useConfetti();

    useEffect(() => {
        document.title = `Happy Birthday ${CONFIG.name}`;
        setTimeout(() => setLoading(false), 2000);
    }, []);

    useEffect(() => {
        if (balloonsPopped >= LETTERS_UNLOCK_TARGET && !lettersUnlocked) {
            setLettersUnlocked(true);
            confetti(window.innerWidth * 0.5, window.innerHeight * 0.4);
        }
    }, [balloonsPopped, lettersUnlocked, confetti]);

    useEffect(() => {
        if (!rewardToast) return;
        const t = setTimeout(() => setRewardToast(''), 1700);
        return () => clearTimeout(t);
    }, [rewardToast]);

    const handleBalloonPopCount = useCallback(() => {
        setBalloonsPopped(prev => prev + 1);
    }, []);

    const navigate = useCallback((p) => {
        if (p === 'letters' && !lettersUnlocked) return;
        if (p === 'finale') {
            setFinaleImagesLoaded(false); // Reset loading state when navigating to finale
        }
        setTearing(false);
        setReadingIdx(null);
        setPage(p);
        window.scrollTo({ top: 0 });
    }, [lettersUnlocked]);

    const proceedToLetter = useCallback((letterIdx, sourcePos) => {
        const wasOpened = opened.has(letterIdx);
        setOpened(prev => { const n = new Set(prev); n.add(letterIdx); return n; });
        setReadingIdx(letterIdx);
        setPage('reading');
        window.scrollTo({ top: 0 });
        if (!wasOpened) {
            const x = sourcePos?.x || window.innerWidth * 0.5;
            const y = sourcePos?.y || window.innerHeight * 0.35;
            confetti(x, y);
        }
    }, [opened, confetti]);

    const openLetter = useCallback((i, e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const sourcePos = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };

        if (opened.has(i)) {
            proceedToLetter(i, sourcePos);
            return;
        }

        setPendingLetter({ idx: i, sourcePos });
        setChallengeInput('');
        setChallengeError('');
        setTapCount(0);
        setChallengeOpen(true);
    }, [opened, proceedToLetter]);

    const closeChallenge = useCallback(() => {
        setChallengeOpen(false);
        setChallengeInput('');
        setChallengeError('');
        setTapCount(0);
        setPendingLetter(null);
    }, []);

    const handleTapChallenge = useCallback(() => {
        setTapCount(prev => prev + 1);
    }, []);

    const submitChallenge = useCallback(() => {
        if (!pendingLetter) return;

        const challenge = getLetterChallenge(pendingLetter.idx);
        const solved = challenge.type === 'tap'
            ? tapCount >= challenge.target
            : normalizeAnswer(challengeInput) === normalizeAnswer(challenge.answer);

        if (solved) {
            const resolved = pendingLetter;
            setSolvedChallenges(prev => prev + 1);
            setRewardToast('+1 badge earned');
            closeChallenge();
            proceedToLetter(resolved.idx, resolved.sourcePos);
            confetti(window.innerWidth - 80, 110);
            return;
        }

        setChallengeError(
            challenge.type === 'tap'
                ? `Keep tapping. Need ${challenge.target - tapCount} more.`
                : 'Not quite. Try again - you got this.'
        );
    }, [pendingLetter, challengeInput, tapCount, closeChallenge, proceedToLetter, confetti]);

    const handleBack = useCallback(() => {
        setTearing(true);
        setTimeout(() => {
            setTearing(false);
            setReadingIdx(null);
            setPage('letters');
            window.scrollTo({ top: 0 });
        }, 480);
    }, []);

    const renderPage = () => {
        switch (page) {
            case 'hero': return <Hero onNav={navigate} onBalloonPop={handleBalloonPopCount} lettersUnlocked={lettersUnlocked} balloonsPopped={balloonsPopped} />;
            case 'letters': return <LettersPage opened={opened} onOpen={(i, e) => openLetter(i, e)} solvedCount={solvedChallenges} rewardToast={rewardToast} />;
            case 'reading': return readingIdx !== null
                ? <ReadingPage index={readingIdx} onBack={handleBack} tearing={tearing} />
                : <LettersPage opened={opened} onOpen={(i, e) => openLetter(i, e)} solvedCount={solvedChallenges} rewardToast={rewardToast} />;
            case 'gallery': return <GalleryPage />;
            case 'wishes': return <ConfessionsPage />;
            case 'finale': return <FinalePage onImagesLoaded={() => setFinaleImagesLoaded(true)} />;
            default: return <Hero onNav={navigate} onBalloonPop={handleBalloonPopCount} lettersUnlocked={lettersUnlocked} balloonsPopped={balloonsPopped} />;
        }
    };

    return (
        <>
            <div className={`loader ${loading ? '' : 'done'}`}>
                <div className="loader-ring" />
                <div className="loader-text">preparing something special...</div>
            </div>
            <Starfield />
            <AnimatedBg />
            <CustomCursor />
            <CursorTrail />
            {!loading && (
                <>
                    <Nav page={page} onNav={navigate} />
                    {renderPage()}
                    <LetterChallengeModal
                        open={challengeOpen}
                        challenge={pendingLetter ? getLetterChallenge(pendingLetter.idx) : null}
                        letterFrom={pendingLetter ? CONFIG.letters[pendingLetter.idx]?.from : ''}
                        answer={challengeInput}
                        onAnswerChange={setChallengeInput}
                        onSubmit={submitChallenge}
                        onSkip={closeChallenge}
                        error={challengeError}
                        tapCount={tapCount}
                        onTap={handleTapChallenge}
                    />
                </>
            )}
        </>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
